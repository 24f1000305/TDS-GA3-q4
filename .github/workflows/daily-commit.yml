name: Daily Auto Commit

permissions:
  contents: write
  
on:
  schedule:
    - cron: "17 3 * * *"   # Runs daily at 03:17 UTC (specific minute & hour)
  workflow_dispatch:       # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "24f1000305@ds.study.iitm.ac.in"

      - name: Update timestamp file - 24f1000305@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date)" >> daily_log.txt

      - name: Commit and push
        run: |
          git add daily_log.txt
          git commit -m "Daily auto commit - $(date)" || echo "No changes to commit"
          git push
